name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        timeout-minutes: 30
        env:
          # Org policy clamps the default GITHUB_TOKEN to read-only, which
          # blocks release create/upload. RELEASE_TOKEN is a fine-grained PAT
          # with contents:write scoped to this repo only.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Plutio LTD (LV436N5433)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: LV436N5433
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          UNIPILE_API_KEY: ${{ secrets.UNIPILE_API_KEY }}
          UNIPILE_API_URL: ${{ secrets.UNIPILE_API_URL }}
          UNIPILE_WEBHOOK_SECRET: ${{ secrets.UNIPILE_WEBHOOK_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          X_API_CLIENT_ID: ${{ secrets.X_API_CLIENT_ID }}
          X_API_CLIENT_SECRET: ${{ secrets.X_API_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Convolios ${{ github.ref_name }}"
          releaseBody: "See the assets for download links."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Ensure latest.json exists
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          # Check if latest.json already uploaded
          if gh release view "$TAG" --json assets --jq '.assets[].name' | grep -q "^latest.json$"; then
            echo "latest.json already exists. Done."
            exit 0
          fi

          echo "latest.json missing — generating manually."

          # Download the tar.gz from the release
          TAR_NAME=$(gh release view "$TAG" --json assets --jq '.assets[].name' | grep '\.app\.tar\.gz$')
          if [ -z "$TAR_NAME" ]; then
            echo "ERROR: No .app.tar.gz found in release assets"
            exit 1
          fi
          gh release download "$TAG" --pattern "$TAR_NAME" --dir /tmp

          # Sign using tauri CLI (uses TAURI_SIGNING_PRIVATE_KEY env var)
          npx tauri signer sign "/tmp/$TAR_NAME" --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          SIGNATURE=$(cat "/tmp/${TAR_NAME}.sig")

          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${TAR_NAME}"

          # Generate latest.json
          node -e "
            const fs = require('fs');
            fs.writeFileSync('/tmp/latest.json', JSON.stringify({
              version: '${VERSION}',
              notes: 'See the assets for download links.',
              pub_date: '${PUB_DATE}',
              platforms: {
                'darwin-aarch64': {
                  signature: fs.readFileSync('/tmp/${TAR_NAME}.sig', 'utf8').trim(),
                  url: '${DOWNLOAD_URL}'
                }
              }
            }, null, 2));
          "

          gh release upload "$TAG" "/tmp/${TAR_NAME}.sig" --clobber || true
          gh release upload "$TAG" /tmp/latest.json --clobber
          echo "Uploaded latest.json to release."
          cat /tmp/latest.json

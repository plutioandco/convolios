name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Plutio LTD (LV436N5433)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: LV436N5433
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Convolios ${{ github.ref_name }}"
          releaseBody: "See the assets for download links."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Generate and upload latest.json if missing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          # Check if latest.json already exists in the release
          if gh release view "$TAG" --json assets --jq '.assets[].name' | grep -q "latest.json"; then
            echo "latest.json already uploaded by tauri-action, skipping."
            exit 0
          fi

          echo "latest.json not found — generating manually."

          # Find the sig file and tar.gz
          SIG_FILE=$(find src-tauri/target/release/bundle -name "*.app.tar.gz.sig" | head -1)
          TAR_FILE=$(find src-tauri/target/release/bundle -name "*.app.tar.gz" | head -1)

          if [ -z "$SIG_FILE" ] || [ -z "$TAR_FILE" ]; then
            echo "ERROR: Could not find .sig or .tar.gz file"
            find src-tauri/target/release/bundle -type f -name "*.sig" -o -name "*.tar.gz" | sort
            exit 1
          fi

          SIGNATURE=$(cat "$SIG_FILE")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/$(basename "$TAR_FILE")"

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See the assets for download links.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIGNATURE}",
                "url": "${DOWNLOAD_URL}"
              }
            }
          }
          EOF

          # Also upload the sig file
          gh release upload "$TAG" "$SIG_FILE" --clobber || true
          gh release upload "$TAG" latest.json --clobber
          echo "Uploaded latest.json and sig file to release."
